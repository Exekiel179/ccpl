version: '3.8'

services:
  web:
    build: .
    container_name: lab-member-system
    ports:
      - "${PORT:-8080}:80"  # 可通过环境变量 PORT 自定义端口，默认 8080
    restart: unless-stopped
    volumes:
      # 挂载本地目录用于备份 localStorage 数据
      - ./backups:/usr/share/nginx/html/backups
    environment:
      - TZ=Asia/Shanghai  # 设置时区
    labels:
      - "com.example.description=课题组成员信息收集系统"
